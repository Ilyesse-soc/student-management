# Déploiement frontend Next.js 14
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: student-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.gitlab.com/efrei/student-management/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_NODE
              value: "http://backend-node.student-management.svc.cluster.local:3001/api/students"
            - name: NEXT_PUBLIC_API_DOTNET
              value: "http://backend-dotnet.student-management.svc.cluster.local:3002/api/students"
            - name: NEXT_PUBLIC_API_SPRING
              value: "http://backend-springboot.student-management.svc.cluster.local:3003/api/students"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
# Service ClusterIP pour frontend
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: student-management
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
