# ConfigMap pour les variables d’environnement MySQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: student-management
data:
  MYSQL_DATABASE: StudentManagement_DEV
  MYSQL_USER: root

---
# Secret pour le mot de passe root MySQL
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: student-management
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root

---
# Service ClusterIP pour MySQL
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: student-management
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
  clusterIP: None

---
# StatefulSet MySQL avec volume persistant et initContainer pour init.sql
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: student-management
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      initContainers:
        - name: init-mysql-db
          image: mysql:8.0
          command:
            ["sh", "-c", "mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD < /docker-entrypoint-initdb.d/init.sql || true"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-initdb
          hostPath:
            path: /mnt/data/mysql-init
            type: DirectoryOrCreate
  volumeClaimTemplates:
    - metadata:
        name: mysql-persistent-storage
        namespace: student-management
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
