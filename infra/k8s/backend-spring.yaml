# Déploiement backend Spring Boot 3.1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-springboot
  namespace: student-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-springboot
  template:
    metadata:
      labels:
        app: backend-springboot
    spec:
      containers:
        - name: backend-springboot
          image: registry.gitlab.com/efrei/student-management/backend-springboot:latest
          ports:
            - containerPort: 3003
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql.student-management.svc.cluster.local:3306/StudentManagement_DEV?useSSL=false&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
# Service ClusterIP pour backend Spring Boot
apiVersion: v1
kind: Service
metadata:
  name: backend-springboot
  namespace: student-management
spec:
  selector:
    app: backend-springboot
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: ClusterIP
---
# HPA pour backend Spring Boot
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-springboot-hpa
  namespace: student-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-springboot
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
