name: CI/CD - Student Management

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Test Backend Node.js
  test-backend-node:
    name: Test Backend Node.js
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: StudentManagement_DEV
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json
      
      - name: Install dependencies
        working-directory: ./backend-node
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./backend-node
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/StudentManagement_DEV
      
      - name: Run Prisma Migrations
        working-directory: ./backend-node
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/StudentManagement_DEV
      
      - name: Run tests
        working-directory: ./backend-node
        run: npm test
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/StudentManagement_DEV
          NODE_ENV: test

  # Job 2: Test Backend .NET
  test-backend-dotnet:
    name: Test Backend .NET
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: StudentManagement_DEV
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        working-directory: ./backend-dotnet
        run: dotnet restore
      
      - name: Build
        working-directory: ./backend-dotnet
        run: dotnet build --no-restore --configuration Release
      
      - name: Run tests
        working-directory: ./backend-dotnet
        run: dotnet test --no-build --configuration Release --verbosity normal

  # Job 3: Test Backend Spring Boot
  test-backend-spring:
    name: Test Backend Spring Boot
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: StudentManagement_DEV
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      
      - name: Build with Maven
        working-directory: ./backend-springboot
        run: ./mvnw clean install -DskipTests
      
      - name: Run tests
        working-directory: ./backend-springboot
        run: ./mvnw test

  # Job 4: Test Frontend Next.js
  test-frontend:
    name: Test Frontend Next.js
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true
      
      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_NODE: http://localhost:3001/api/students
          NEXT_PUBLIC_API_DOTNET: http://localhost:3002/api/students
          NEXT_PUBLIC_API_SPRING: http://localhost:3003/api/students

  # Job 5: Build Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend-node, test-backend-dotnet, test-backend-spring, test-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend Node Image
        working-directory: ./backend-node
        run: docker build -t student-management-backend-node:latest .
      
      - name: Build Backend .NET Image
        working-directory: ./backend-dotnet
        run: docker build -t student-management-backend-dotnet:latest .
      
      - name: Build Backend Spring Image
        working-directory: ./backend-springboot
        run: docker build -t student-management-backend-spring:latest .
      
      - name: Build Frontend Image
        working-directory: ./frontend
        run: docker build -t student-management-frontend:latest .
      
      - name: Test Docker Compose
        working-directory: ./infra/docker-compose
        run: |
          docker-compose -f docker-compose.dev.yml config
          echo "✓ Docker Compose configuration is valid"

  # Job 6: Deploy Notification
  deploy-notification:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: always()
    
    steps:
      - name: Deployment Success
        if: needs.build-docker.result == 'success'
        run: |
          echo "✅ All tests passed and Docker images built successfully!"
          echo "🚀 Ready for deployment"
      
      - name: Deployment Failed
        if: needs.build-docker.result != 'success'
        run: |
          echo "❌ Pipeline failed. Check the logs above."
          exit 1
